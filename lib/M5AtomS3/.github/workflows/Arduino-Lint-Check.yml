name: Arduino Lint Check
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
jobs:
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: arduino/arduino-lint-action@67a260f6a5747d75bd6871a63fd3ce436befd866 # v1.0.2
        with:
          library-manager: update
          compliance: strict
          project-type: all